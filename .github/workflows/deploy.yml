name: Deploy PRISM to GitHub Pages

on:
  # Push triggers are disabled by default for template users.
  # Uncomment the lines below to enable automatic deployment on push.
  push:
   branches: 
       - main
       - ci
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Capture visual smoke screenshots
        continue-on-error: true
        run: |
          npx playwright@latest install --with-deps chromium
          mkdir -p visual-smoke-root/Xuesong_MedAI
          cp -R out/. visual-smoke-root/Xuesong_MedAI/
          npx serve@latest visual-smoke-root -l 4173 &
          npx wait-on@latest http://127.0.0.1:4173/Xuesong_MedAI/
          mkdir -p screenshots
          npx playwright@latest screenshot --browser=chromium --viewport-size=1440,1100 http://127.0.0.1:4173/Xuesong_MedAI/ screenshots/home-desktop.png
          npx playwright@latest screenshot --browser=chromium --viewport-size=390,1100 http://127.0.0.1:4173/Xuesong_MedAI/ screenshots/home-mobile.png
          npx playwright@latest screenshot --browser=chromium --viewport-size=1440,1100 http://127.0.0.1:4173/Xuesong_MedAI/publications/ screenshots/publications-desktop.png
          npx playwright@latest screenshot --browser=chromium --viewport-size=390,1100 http://127.0.0.1:4173/Xuesong_MedAI/blogs/ screenshots/blogs-mobile.png

      - name: Upload visual smoke screenshots
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: visual-smoke-screenshots
          path: screenshots

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
